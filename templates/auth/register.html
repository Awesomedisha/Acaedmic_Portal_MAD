<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register – PlacementHub</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <img src="{{ url_for('static', filename='img/logo.png') }}" alt="PlacementHub Logo" style="width: 60px; height: 60px; margin-bottom: 12px;">
      <h1 style="margin:0;">PlacementHub</h1>
      <p>Create your account</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('auth.register') }}" id="registerForm" novalidate>
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" class="form-control"
               placeholder="Your full name" required minlength="2">
      </div>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" class="form-control"
               placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" class="form-control"
               placeholder="At least 6 characters" required minlength="6">
      </div>
      <div class="form-group">
        <label for="role">Register As</label>
        <select id="role" name="role" class="form-control" required>
          <option value="student">🎒 Student</option>
          <option value="recruiter">🏢 Recruiter</option>
        </select>
        <div class="form-hint">Admins are created by the system administrator.</div>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:12px;">
        Create Account →
      </button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a>
    </div>
    <div class="auth-footer" style="margin-top:8px;">
      <a href="{{ url_for('index') }}">← Back to Home</a>
    </div>
  </div>
</div>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
