<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login – PlacementHub</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <img src="{{ url_for('static', filename='img/logo.png') }}" alt="PlacementHub Logo" style="width: 60px; height: 60px; margin-bottom: 12px;">
      <h1 style="margin:0;">PlacementHub</h1>
      <p>Sign in to your account</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('auth.login') }}" id="loginForm" novalidate>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" class="form-control"
               placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" class="form-control"
               placeholder="Enter your password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:12px;">
        Sign In →
      </button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="{{ url_for('auth.register') }}">Register here</a>
    </div>
    <div class="auth-footer" style="margin-top:8px;">
      <a href="{{ url_for('index') }}">← Back to Home</a>
    </div>
  </div>
</div>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
